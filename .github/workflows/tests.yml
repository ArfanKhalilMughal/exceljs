name: Tests

on:
  push:
    branches: [ development, "fix/*", "feature/*" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    name: Node v${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # @zklogic/saxes requires Node >= 18
        node-version: [18.x, 20.x, 22.x]
        # lowercase runner labels required
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set git config
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.symlinks true
        if: runner.os == 'Windows'
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install global grunt-cli
        run: npm install -g grunt-cli
      - run: npm install
      # Do NOT use `npm test` (= test:full = build + unit + integration + e2e + jasmine).
      # grunt jasmine uses phantomjs-prebuilt (abandoned headless browser):
      #   - crashes on macOS Catalina+ and Windows CI runners
      #   - install script uses crypto.createCipher (removed in Node 20), breaking
      #     `npm install` on Node 20
      # Run the four non-browser stages as separate named steps instead.
      - name: Build
        run: npm run build
        env:
          CI: true
      - name: Unit tests
        run: npm run test:unit
        env:
          CI: true
      - name: Integration tests
        run: npm run test:integration
        env:
          CI: true
      - name: End-to-end tests
        run: npm run test:end-to-end
        env:
          CI: true

  benchmark:
    timeout-minutes: 15
    name: Measure performance impact of changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run benchmark
        env:
          CI: true

  typescript:
    timeout-minutes: 15
    name: Ensure typescript compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      # Do NOT run `npm install typescript` -- it overwrites devDep typescript@^3.9.7
      # with TypeScript 5.x (latest), which breaks the existing index.d.ts typings.
      # typescript@3.9.7 is already installed by `npm install` above.
      # Use npx to resolve the local devDep binary, avoiding PATH issues on Windows.
      - run: npx tsc index.d.ts
        env:
          CI: true

  publish:
    # Publish to npm only on version tags
    needs: [test, typescript]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - name: Build
        run: npm run build
        env:
          CI: true
      - name: Verify dist directory
        run: |
          if [ ! -d 'dist' ] || [ -z "$(ls -A dist)" ]; then
            echo "ERROR: dist/ directory is empty or missing. Build must complete successfully."
            exit 1
          fi
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
